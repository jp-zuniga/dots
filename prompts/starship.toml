[character]
format         = "$symbol "
success_symbol = "[ ‚óč](bold fg:#a3aed2)"
error_symbol   = "[ ‚Ė†](bold fg:#a3aed2)"

[directory]
style             = "fg:#e3e5e5 bg:#769ff0"
format            = "[ $path ]($style)"
truncation_length = 6
truncation_symbol = "‚Ä¶ /"
truncate_to_repo  = false

[directory.substitutions]
"dev"       = " ůį≤č "
"Documents" = " ůįąô "
"Downloads" = " ÔÄô "
"Music"     = " ůįĚö "
"Pictures"  = " ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style  = "fg:#769ff0 bg:#394260"
format = "[[ $symbol $branch ]($style)]($style)"

[git_status]
style  = "fg:#769ff0 bg:#394260"
format = "[[($all_status$ahead_behind )]($style)]($style)"

[time]
disabled    = false
use_12hr    = true
time_format = "%A, at %R"
style       = "fg:#a0a9cb bg:#1d2230"
format      = "[[ $time ]($style)]($style)"

