source = ~/.config/hypr/themes/rose-pine-moon.conf

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND
background {
  monitor     =
  path        = /home/jaq/dots/dots/wallpapers/.current.png
  blur_passes = 1
  blur_size   = 3
  color       = $base
}

# INPUT FIELD
input-field {
  monitor           =
  size              = 400, 60
  outline_thickness = 5
  dots_size         = 0.1
  dots_spacing      = 0.1
  dots_center       = true
  outer_color       = $iris
  inner_color       = $surface
  font_color        = $text
  fade_on_empty     = false
  placeholder_text  = 󰌾 Logged in as <b>$USER</b>
  hide_input        = false
  check_color       = $pine
  fail_color        = $love
  fail_text         = Incorrect password!
  capslock_color    = $gold
  position          = 0,   0
  halign            = center
  valign            = center
}

# LAYOUT
label {
  monitor   =
  text      = <i>$LAYOUT</i>
  color     = $text
  font_size = 12
  position  = 0, -60
  halign    = center
  valign    = center
}

# TIME
label {
  monitor   =
  text      = $TIME
  color     = $text
  font_size = 72
  position  = -30, 0
  halign    = right
  valign    = top
}

# DATE
label {
  monitor   =
  text      = cmd[update:43200000] date +"%x"
  color     = $text
  font_size = 28
  position  = -35, -120
  halign    = right
  valign    = top
}
