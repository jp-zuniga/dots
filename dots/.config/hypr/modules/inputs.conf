#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#gestures

gestures {
    workspace_swipe = false
}

# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    kb_layout               = us
    follow_mouse            = 1
    sensitivity             = 0
    touchpad:natural_scroll = true
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

bind = ALT, Tab, cyclenext, bringactivetotops

bind =      , code:107, exec, hyprshot -m region -o ~/pics
bind = SHIFT, code:107, exec, hyprshot -m active -m window -o ~/pics
bind = SUPER, code:107, exec, hyprshot -m active -m output -o ~/pics

bind = SUPER,       B, exec,        waybar &
bind = SUPER,       F, exec,        $terminal -e $shell -c $fileManager
bind = SUPER,       H, togglesplit,
bind = SUPER,       L, exec,        hyprlock
bind = SUPER,       M, exit,
bind = SUPER,       N, exec,        $terminal -e $shell -c nmtui
bind = SUPER,       S, exec,        $menu -show drun
bind = SUPER,       Q, killactive,
bind = SUPER SHIFT, Q, exec,        systemctl suspend
bind = SUPER,       T, exec,        $terminal
bind = SUPER,       W, exec,        $HYPR_CONFIG/scripts/random-wall.sh
bind = SUPER,       V, exec,        kill $(pgrep waybar)

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Keys for volume and LCD brightness:
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -n2 set 5%-
