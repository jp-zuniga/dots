source = ~/.config/hypr/themes/rose-pine-moon.conf

# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND
background {
    monitor     =
    blur_passes = 1
    blur_size   = 3
    color       = $base
    path        = /home/jaq/dots/wallpapers/.current.png
}

# INPUT FIELD
input-field {
    monitor           =
    position          = 0, 0
    size              = 360, 60

    halign            = center
    valign            = center

    dots_center       = true
    dots_size         = 0.1
    dots_spacing      = 0.1

    capslock_color    = $gold
    check_color       = $pine
    font_color        = $text
    inner_color       = $surface
    outer_color       = $iris
    fail_color        = $love

    fade_on_empty     = false
    hide_input        = false
    outline_thickness = 3

    fail_text         = <b>󰌾</b>
    placeholder_text  = <b>󰌾 $USER</b>
}

# LAYOUT
# label {
#     monitor   =
#     position  = 0, -60

#     color     = $text
#     halign    = center
#     valign    = center

#     font_size = 12
#     text      = <i>$LAYOUT</i>
# }

# DATE
label {
    monitor   =
    position  = 20, -8

    halign    = left
    valign    = top

    color     = $text
    font_size = 24

    text      = cmd[update:43200000] date +"%x"
}

# TIME
label {
    monitor   =
    position  = -20, -8

    halign    = right
    valign    = top

    color     = $text
    font_size = 24

    text      = $TIME
}
