#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#gestures

gestures {
    workspace_swipe = false
}

# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    kb_layout      = us
    # kb_variant     = qwerty,
    # kb_options     = grp:win_space_toggle
    follow_mouse   = 1
    sensitivity    = 0
    touchpad:natural_scroll = true
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

bind = ALT,       Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev

bind = SUPER, Tab, workspace, previous

# screenshot
bind =      , PRINT, exec, hyprshot -m region           -o ~/pics
bind = SHIFT, PRINT, exec, hyprshot -m active -m window -o ~/pics
bind = SUPER, PRINT, exec, hyprshot -m active -m output -o ~/pics

# switch keyboard layout
# bind = SUPER, SPACE, exec, hyprctl switchxkblayout all next

# quit hyprland
bind = SUPER, ESCAPE, exit,

bind = ALT SHIFT, W, movefocus, u
bind = ALT SHIFT, A, movefocus, d
bind = ALT SHIFT, S, movefocus, l
bind = ALT SHIFT, D, movefocus, r

bind = ALT CONTROL, W, swapwindow, u
bind = ALT CONTROL, A, swapwindow, d
bind = ALT CONTROL, S, swapwindow, l
bind = ALT CONTROL, D, swapwindow, r

bind = CONTROL SHIFT, W, layoutmsg, orientationtop
bind = CONTROL SHIFT, A, layoutmsg, orientationbottom
bind = CONTROL SHIFT, S, layoutmsg, orientationleft
bind = CONTROL SHIFT, D, layoutmsg, orientationright

bind = SUPER,       B, exec,       waybar
bind = SUPER SHIFT, B, exec,       kill $(pgrep waybar)
bind = SUPER,       C, exec,       code
bind = SUPER,       E, exec,       $terminal -e $shell -c $fileManager
bind = SUPER,       F, exec,       firefox
bind = SUPER,       L, exec,       hyprlock
bind = SUPER,       M, exec,       ~/.config/hypr/scripts/focus.sh
bind = SUPER,       N, exec,       $terminal -e $shell -c nmtui
bind = SUPER,       S, exec,       $menu -show drun
bind = SUPER,       Q, killactive,
bind = SUPER SHIFT, Q, exec,       systemctl suspend
bind = SUPER,       T, exec,       $terminal
bind = SUPER,       W, exec,       ~/.config/hypr/scripts/random-wall.sh

# move to different workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# send current window to different workspaces
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# same as above, but without switching to the new workspace
bind = SUPER CONTROL, 1, movetoworkspacesilent, 1
bind = SUPER CONTROL, 2, movetoworkspacesilent, 2
bind = SUPER CONTROL, 3, movetoworkspacesilent, 3
bind = SUPER CONTROL, 4, movetoworkspacesilent, 4
bind = SUPER CONTROL, 5, movetoworkspacesilent, 5
bind = SUPER CONTROL, 6, movetoworkspacesilent, 6
bind = SUPER CONTROL, 7, movetoworkspacesilent, 7
bind = SUPER CONTROL, 8, movetoworkspacesilent, 8
bind = SUPER CONTROL, 9, movetoworkspacesilent, 9
bind = SUPER CONTROL, 0, movetoworkspacesilent, 10

# mouse window bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# bindings for volume:
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# bindings for brightness:
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -n2 set 5%-
